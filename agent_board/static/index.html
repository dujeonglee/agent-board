<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-board</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- 첫 페인트 전 테마 적용 (FOUC 방지) — agent-cli 와 동일 키 공유 -->
  <script>
    (function () {
      var THEMES = ["amber", "slate", "midnight", "terminal", "light"];
      try {
        var t = localStorage.getItem("agentcli_theme");
        if (THEMES.indexOf(t) === -1) {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "amber";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "amber");
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>agent-board</h1>
    <label class="open-mode" title="끄면 새 탭에서 열림">
      <input type="checkbox" id="same-tab"> 현재 페이지에서 열기
    </label>
    <a id="admin-link" href="/admin" title="admin — agent-cli config/models 편집">⚙</a>
    <span id="theme-wrap">
      <button id="theme-btn" class="btn-icon" type="button" title="테마 선택" aria-haspopup="true" aria-expanded="false">🎨</button>
      <div id="theme-menu" role="menu" hidden></div>
    </span>
  </header>

  <section id="new">
    <input id="new-topic" type="text" placeholder="주제 - 예: 라이브러리 만들기" maxlength="200">
    <select id="new-model" title="모델 (선택 안 하면 기본)">
      <option value="">기본 모델</option>
    </select>
    <button id="clone-toggle" type="button" class="btn-ghost"
            title="다른 글의 파일/대화를 복사해서 시작">📋 복제</button>
    <button id="new-create" type="button" class="btn-primary">+ 새 글</button>
  </section>
  <!-- 대화방 clone: 원본 글 선택 → 워크스페이스 파일 트리에서 복사할
       항목 체크 (.agent-cli/sessions/… 를 고르면 대화까지 이어받음). -->
  <section id="clone-panel" hidden>
    <div class="clone-row">
      <label>복제 원본</label>
      <select id="clone-source"><option value="">(선택)</option></select>
      <span id="clone-hint" class="clone-hint">파일/폴더를 체크하세요. <code>.agent-cli</code> 를 포함하면 대화까지 이어집니다.</span>
    </div>
    <div id="clone-tree" class="clone-tree"></div>
  </section>

  <main id="posts"></main>

  <script src="/static/app.js"></script>
</body>
</html>
